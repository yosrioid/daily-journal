name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "phase/**"
      - "feat/**"
      - "fix/**"

permissions:
  contents: read

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run lint
        run: ruff check .

      - name: Run tests
        run: pytest
